<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Tournify Calendar Exporter
  </title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
<style>

:root {
  --tournament-color: #0b2d69;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #f5f7fb;
  font-family: Inter, sans-serif;
  color: #1f2937;
}

.app {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px;
}

.hero {
  background: var(--tournament-color);
  color: white;
  padding: 28px;
  border-radius: 16px;
  display: flex;
  gap: 18px;
  align-items: center;
  box-shadow:
    0 10px 30px rgba(0,0,0,.15);
}

.hero__icon {
  font-size: 48px;
}

.hero h1 {
  margin: 0;
  font-size: 32px;
}

.hero h2 {
  margin: 8px 0 0;
  font-weight: 400;
  opacity: .9;
}

.toolbar {
  margin-top: 24px;
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.field-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.field-group label {
  font-weight: 600;
}

select {
  min-width: 250px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #d1d5db;
  background: white;
  font-size: 15px;
}

.calendar-action {
   display: none;
   text-align: center;
  margin: 30px 0;
}

#generateBtn {
  background: var(--tournament-color);
  color: white;
  border: 0;
  border-radius: 10px;
  padding: 14px 32px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  min-width: 260px;
}

#generateBtn:disabled {
  opacity: .5;
  cursor: not-allowed;
}

#results {
  margin-top: 30px;
}

.empty-state {
  background: white;
  border-radius: 16px;
  padding: 60px 30px;
  text-align: center;
  box-shadow:
    0 2px 12px rgba(0,0,0,.08);
}

.empty-state__icon {
  font-size: 64px;
}

.empty-state h3 {
  margin-top: 20px;
  font-size: 24px;
}

.empty-state p {
  color: #6b7280;
}

.stats {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 20px;
  margin: 24px 0;
}

.stat-card {
  background: white;
  border-radius: 14px;
  padding: 24px;
  text-align: center;
  box-shadow:
    0 2px 12px rgba(0,0,0,.08);
}

.stat-value {
  font-size: 40px;
  font-weight: 700;
}

.stat-label {
  color: #6b7280;
  margin-top: 6px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 14px;
  overflow: hidden;
  box-shadow:
    0 2px 12px rgba(0,0,0,.08);
  margin-bottom: 30px;
}

th {
  background: var(--tournament-color);
  color: white;
  padding: 14px;
  text-align: left;
}

td {
  padding: 14px;
  border-bottom: 1px solid #eee;
}

tr:last-child td {
  border-bottom: 0;
}

h3 {
  margin-top: 32px;
  margin-bottom: 12px;
}
.footer-bar {
  margin-top: 40px;
  padding: 16px 20px;
  background: white;
  border-radius: 12px;

  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 20px;

  box-shadow:
    0 2px 12px rgba(0,0,0,.08);
}

.footer-text {
  font-size: 14px;
  color: #666;
}

.footer-text a {
  color: var(--tournament-color);
  font-weight: 600;
  text-decoration: none;
}

.footer-btn {
  display: inline-flex;
  align-items: center;

  padding: 10px 16px;

  border-radius: 8px;

  background: var(--tournament-color);
  color: white;

  text-decoration: none;
  font-size: 14px;
  font-weight: 600;

  white-space: nowrap;
}

.footer-btn:hover {
  opacity: .9;
}
  
@media (max-width: 768px) {

 .stats {
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .stat-card {
    padding: 16px 8px;
  }

  .stat-value {
    font-size: 28px;
  }

  .stat-label {
    font-size: 12px;
  }
  .footer-bar {
  flex-direction: column;
  text-align: center;
}

.footer-btn {
  width: 100%;
  justify-content: center;
}

}

  .toolbar {
    flex-direction: column;
    gap: 16px;
  }

  .field-group {
    width: 100%;
  }

  select {
    width: 100%;
    min-width: 0;
  }

  .calendar-action {
    width: 100%;
  }

  #generateBtn {
    width: 100%;
    min-width: 0;
  }

  table {
    display: block;
    overflow-x: auto;
    white-space: nowrap;
  }

  .hero {
    padding: 20px;
  }

  .hero__icon {
    font-size: 40px;
  }

  .hero h1 {
    font-size: 24px;
  }

  .hero h2 {
    font-size: 16px;
  }

}

  
.team-card {
  background: white;
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 24px;

  box-shadow:
    0 2px 12px rgba(0,0,0,.08);
}

.team-card h2 {
  margin: 0;
}

.division-badge {
  display: inline-block;

  margin-top: 10px;

  padding:
    6px 12px;

  border-radius: 999px;

  background:
    rgba(0,0,0,.06);

  color:
    var(--tournament-color);

  font-size: 13px;

  font-weight: 600;
}

  .team-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.team-country {
  font-size: 18px;
  font-weight: 600;
  color: #666;
}

  .action-group {
  justify-content: flex-end;
}

.toolbar {
  align-items: flex-end;
}

#generateBtn {
  height: 49px;
}

.spinner {
  width: 48px;
  height: 48px;

  margin: 0 auto 20px;

  border: 4px solid #e5e7eb;
  border-top-color: var(--tournament-color);

  border-radius: 50%;

  animation: spin 1s linear infinite;
}

@keyframes spin {

  to {
    transform: rotate(360deg);
  }

}
  
</style>
</head>

<body>

  <div class="app">

    <header class="hero">

      <div class="hero__icon">
        📅
      </div>

      <div>

        <h1>
          Tournify Calendar Exporter
        </h1>

        <h2 id="pageTitle">
          Loading tournament...
        </h2>

      </div>

    </header>

   <div id="controls">


<section class="toolbar">

  <div class="field-group">

    <label for="divisionSelect">
      Division
    </label>

    <select id="divisionSelect"></select>

  </div>

  <div class="field-group">

    <label for="teamSelect">
      Team
    </label>

    <select id="teamSelect"></select>

  </div>

  <div class="field-group action-group">

    <label>
      &nbsp;
    </label>

    <button id="generateBtn">
      Generate Calendar
    </button>

  </div>

</section>
     

</div>
    
   <div id="results"></div>
  </div>

  <div class="footer-text">
    This app was built by
    <a
      href="https://www.instagram.com/meg_mac44/"
      target="_blank"
      rel="noopener"
    >
      Meghann MacDonald
    </a>.
    You're welcome!
  </div>

  <a
    class="footer-btn"
    href="/"
  >
    Search all upcoming tournaments
  </a>

  
  <script
    type="module"
    src="./app.js"
  ></script>

</body>

</html>
