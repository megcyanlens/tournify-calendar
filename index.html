<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Tournify Calendar Exporter
  </title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

</head>

<body>

  <div class="app">

    <header class="hero">

      <div class="hero__icon">
        📅
      </div>

      <div>

        <h1>
          Tournify Calendar Exporter
        </h1>

        <h2 id="pageTitle">
          Loading tournament...
        </h2>

      </div>

    </header>

   <div id="controls">

  <section class="toolbar">


      <div class="field-group">

        <label for="divisionSelect">
          Division
        </label>

        <select id="divisionSelect">

          <option value="">
            All Divisions
          </option>

        </select>

      </div>

      <div class="field-group">

        <label for="teamSelect">
          Team
        </label>

        <select id="teamSelect">

          <option value="">
            Select a team...
          </option>

        </select>

      </div>

    </section>

 <button id="generateBtn">
    Generate Calendar
  </button>

</div>
    
   <div id="results"></div>
  </div>

  <script
    type="module"
    src="./app.js"
  ></script>

</body>

</html>
