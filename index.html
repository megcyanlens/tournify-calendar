<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Tournify Calendar Exporter
  </title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
<link
  rel="stylesheet"
  href="./styles.css"
/>


</head>

<body>

  <div class="app">

    <header class="hero">

      <div class="hero__icon">
        📅
      </div>

      <div>

        <h1>
          Tournify Calendar Exporter
        </h1>

        <h2 id="pageTitle">
          Loading tournament...
        </h2>

      </div>

    </header>

   <div id="controls">


<section class="toolbar">

  <div class="field-group">

    <label for="divisionSelect">
      Division
    </label>

    <select id="divisionSelect"></select>

  </div>

  <div class="field-group">

    <label for="teamSelect">
      Team
    </label>

    <select id="teamSelect"></select>

  </div>

  <div class="field-group action-group">

    <label>
      &nbsp;
    </label>

    <button id="generateBtn">
      Generate Calendar
    </button>

  </div>

</section>
     

    
   <div id="results"></div>
  </div>
<footer class="footer-bar">

  <div class="footer-text">
    This app was built by
    <a
      href="https://www.instagram.com/meg_mac44/"
      target="_blank"
      rel="noopener"
    >
      Meg MacDonald</a>.
    You're welcome!
  </div>

  <a
    class="footer-btn"
    href="/"
  >
    Search all upcoming tournaments
  </a>
</footer>
  </div>

  <script
    type="module"
    src="./app.js"
  ></script>

</body>

</html>
